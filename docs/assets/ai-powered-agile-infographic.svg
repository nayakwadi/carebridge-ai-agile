<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7c86"/>
      <stop offset="1" stop-color="#0a5b63"/>
    </linearGradient>
    <linearGradient id="tech" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e7c86"/>
