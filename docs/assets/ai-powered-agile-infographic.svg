<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1426"/>
      <stop offset="1" stop-color="#081a20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.8">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="techGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="1500" fill="url(#bgGrad)"/>
  <rect width="1200" height="1500" fill="url(#glow)"/>

  <!-- ===== header ===== -->
  <rect x="368" y="44" width="464" height="46" rx="23" fill="#14b8a6" fill-opacity="0.14" stroke="#2dd4bf" stroke-opacity="0.55" stroke-width="2"/>
  <text x="600" y="74" text-anchor="middle" fill="#5eead4" font-size="22" font-weight="700" letter-spacing="3">SOFTWARE DEVELOPMENT LIFE CYCLE</text>
  <text x="600" y="158" text-anchor="middle" fill="url(#titleGrad)" font-size="72" font-weight="800" letter-spacing="1">AI-POWERED SDLC</text>
  <text x="600" y="202" text-anchor="middle" fill="#cbd5e1" font-size="28" font-weight="600">How AI worked at every phase of building CareBridge</text>
  <text x="600" y="236" text-anchor="middle" fill="#64748b" font-size="22">A 3-tier app · React · FastAPI · PostgreSQL · Docker</text>

  <!-- ===== lifecycle spine (behind badges) ===== -->
  <line x1="120" y1="346" x2="120" y2="1246" stroke="url(#spineGrad)" stroke-opacity="0.16" stroke-width="18" stroke-linecap="round"/>
  <line x1="120" y1="346" x2="120" y2="1246" stroke="url(#spineGrad)" stroke-opacity="0.7" stroke-width="6" stroke-linecap="round"/>

  <!-- ============ PHASE 1 : PLAN ============ -->
  <g>
    <rect x="210" y="268" width="910" height="156" rx="18" fill="#0f1d33" stroke="#20314d" stroke-width="2"/>
    <rect x="210" y="268" width="8" height="156" rx="4" fill="#60a5fa"/>
    <circle cx="120" cy="346" r="62" fill="#60a5fa" fill-opacity="0.18"/>
    <circle cx="120" cy="346" r="46" fill="#60a5fa"/>
    <text x="120" y="362" text-anchor="middle" fill="#0b1426" font-size="44" font-weight="800">1</text>
    <text x="250" y="334" fill="#f8fafc" font-size="40" font-weight="800">PLAN &amp; REQUIREMENTS</text>
    <text x="250" y="384" font-size="26" fill="#94a3b8"><tspan fill="#60a5fa" font-weight="800">AI →</tspan> analyzes the brief, prioritizes the backlog</text>
    <rect x="900" y="302" width="200" height="44" rx="22" fill="#60a5fa" fill-opacity="0.14" stroke="#60a5fa" stroke-opacity="0.5"/>
    <text x="1000" y="330" text-anchor="middle" fill="#93c5fd" font-size="21" font-weight="700">Brief · Backlog</text>
  </g>

  <!-- ============ PHASE 2 : DESIGN ============ -->
  <g>
    <rect x="210" y="448" width="910" height="156" rx="18" fill="#0f1d33" stroke="#20314d" stroke-width="2"/>
    <rect x="210" y="448" width="8" height="156" rx="4" fill="#38bdf8"/>
    <circle cx="120" cy="526" r="62" fill="#38bdf8" fill-opacity="0.18"/>
    <circle cx="120" cy="526" r="46" fill="#38bdf8"/>
    <text x="120" y="542" text-anchor="middle" fill="#0b1426" font-size="44" font-weight="800">2</text>
    <text x="250" y="514" fill="#f8fafc" font-size="40" font-weight="800">DESIGN</text>
    <text x="250" y="564" font-size="26" fill="#94a3b8"><tspan fill="#38bdf8" font-weight="800">AI →</tspan> drafts the 3-tier architecture, data model &amp; ADRs</text>
    <rect x="900" y="482" width="200" height="44" rx="22" fill="#38bdf8" fill-opacity="0.14" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="1000" y="510" text-anchor="middle" fill="#7dd3fc" font-size="21" font-weight="700">Architecture</text>
  </g>

  <!-- ============ PHASE 3 : DEVELOP ============ -->
  <g>
    <rect x="210" y="628" width="910" height="156" rx="18" fill="#0f1d33" stroke="#20314d" stroke-width="2"/>
    <rect x="210" y="628" width="8" height="156" rx="4" fill="#22d3ee"/>
    <circle cx="120" cy="706" r="62" fill="#22d3ee" fill-opacity="0.18"/>
    <circle cx="120" cy="706" r="46" fill="#22d3ee"/>
    <text x="120" y="722" text-anchor="middle" fill="#0b1426" font-size="44" font-weight="800">3</text>
    <text x="250" y="694" fill="#f8fafc" font-size="40" font-weight="800">DEVELOP</text>
    <text x="250" y="744" font-size="26" fill="#94a3b8"><tspan fill="#22d3ee" font-weight="800">AI →</tspan> scaffolds React · FastAPI · PostgreSQL</text>
    <rect x="900" y="662" width="200" height="44" rx="22" fill="#22d3ee" fill-opacity="0.14" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text x="1000" y="690" text-anchor="middle" fill="#67e8f9" font-size="21" font-weight="700">Code · API</text>
  </g>

  <!-- ============ PHASE 4 : TEST ============ -->
  <g>
    <rect x="210" y="808" width="910" height="156" rx="18" fill="#0f1d33" stroke="#20314d" stroke-width="2"/>
    <rect x="210" y="808" width="8" height="156" rx="4" fill="#2dd4bf"/>
    <circle cx="120" cy="886" r="62" fill="#2dd4bf" fill-opacity="0.18"/>
    <circle cx="120" cy="886" r="46" fill="#2dd4bf"/>
    <text x="120" y="902" text-anchor="middle" fill="#0b1426" font-size="44" font-weight="800">4</text>
    <text x="250" y="874" fill="#f8fafc" font-size="40" font-weight="800">TEST</text>
    <text x="250" y="924" font-size="26" fill="#94a3b8"><tspan fill="#2dd4bf" font-weight="800">AI →</tspan> writes pytest suites &amp; quality gates</text>
    <rect x="900" y="842" width="200" height="44" rx="22" fill="#2dd4bf" fill-opacity="0.14" stroke="#2dd4bf" stroke-opacity="0.5"/>
    <text x="1000" y="870" text-anchor="middle" fill="#5eead4" font-size="21" font-weight="700">Pytest · CI</text>
  </g>

  <!-- ============ PHASE 5 : DEPLOY ============ -->
  <g>
    <rect x="210" y="988" width="910" height="156" rx="18" fill="#0f1d33" stroke="#20314d" stroke-width="2"/>
    <rect x="210" y="988" width="8" height="156" rx="4" fill="#34d399"/>
    <circle cx="120" cy="1066" r="62" fill="#34d399" fill-opacity="0.18"/>
    <circle cx="120" cy="1066" r="46" fill="#34d399"/>
    <text x="120" y="1082" text-anchor="middle" fill="#0b1426" font-size="44" font-weight="800">5</text>
    <text x="250" y="1054" fill="#f8fafc" font-size="40" font-weight="800">DEPLOY</text>
    <text x="250" y="1104" font-size="26" fill="#94a3b8"><tspan fill="#34d399" font-weight="800">AI →</tspan> containerizes with Docker Compose &amp; CI/CD</text>
    <rect x="900" y="1022" width="200" height="44" rx="22" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="1000" y="1050" text-anchor="middle" fill="#6ee7b7" font-size="21" font-weight="700">Docker · Actions</text>
  </g>

  <!-- ============ PHASE 6 : OPERATE ============ -->
  <g>
    <rect x="210" y="1168" width="910" height="156" rx="18" fill="#0f1d33" stroke="#20314d" stroke-width="2"/>
    <rect x="210" y="1168" width="8" height="156" rx="4" fill="#4ade80"/>
    <circle cx="120" cy="1246" r="62" fill="#4ade80" fill-opacity="0.18"/>
    <circle cx="120" cy="1246" r="46" fill="#4ade80"/>
    <text x="120" y="1262" text-anchor="middle" fill="#0b1426" font-size="44" font-weight="800">6</text>
    <text x="250" y="1234" fill="#f8fafc" font-size="40" font-weight="800">OPERATE &amp; ITERATE</text>
    <text x="250" y="1284" font-size="26" fill="#94a3b8"><tspan fill="#4ade80" font-weight="800">AI →</tspan> runs retros, sentiment &amp; compliance risk reviews</text>
    <rect x="900" y="1202" width="200" height="44" rx="22" fill="#4ade80" fill-opacity="0.14" stroke="#4ade80" stroke-opacity="0.5"/>
    <text x="1000" y="1230" text-anchor="middle" fill="#86efac" font-size="21" font-weight="700">Retro · HIPAA/GDPR</text>
  </g>

  <!-- ===== core technique bar ===== -->
  <rect x="140" y="1348" width="920" height="86" rx="18" fill="url(#techGrad)"/>
  <text x="600" y="1380" text-anchor="middle" fill="#06303a" font-size="20" font-weight="700" letter-spacing="2">THE ONE TECHNIQUE BEHIND EVERY PHASE</text>
  <text x="600" y="1416" text-anchor="middle" fill="#06243a" font-size="32" font-weight="800">Act as a ROLE → Create a TASK → Show as a FORMAT</text>

  <!-- footer -->
  <text x="600" y="1470" text-anchor="middle" fill="#64748b" font-size="24" font-weight="600">github.com/nayakwadi/carebridge-ai-agile</text>
</svg>
