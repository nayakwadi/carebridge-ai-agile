  <text x="600" y="92" text-anchor="middle" fill="#ffffff" font-size="66" font-weight="800" letter-spacing="1">AI-POWERED AGILE</text>
  <text x="600" y="146" text-anchor="middle" fill="#cdeef0" font-size="30" font-weight="600">How I used AI at every step to build CareBridge</text>
  <text x="600" y="186" text-anchor="middle" fill="#9ad8dd" font-size="23">A 3-tier app &#183; React &#183; FastAPI &#183; PostgreSQL</text>

  <!-- ================= STEP TEMPLATE ================= -->
  <!-- step 1 -->
  <g>
