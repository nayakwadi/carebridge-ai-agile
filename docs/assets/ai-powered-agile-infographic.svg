  <rect x="80" y="1330" width="1040" height="92" rx="16" fill="url(#tech)"/>
  <text x="600" y="1369" text-anchor="middle" fill="#bdebee" font-size="22" font-weight="700" letter-spacing="2">THE ONE TECHNIQUE BEHIND IT ALL</text>
  <text x="600" y="1404" text-anchor="middle" fill="#ffffff" font-size="33" font-weight="800">Act as a ROLE  &#8594;  Create a TASK  &#8594;  Show as a FORMAT</text>

  <!-- footer -->
