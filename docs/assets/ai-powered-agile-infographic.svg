    <rect x="80" y="970" width="1040" height="150" rx="16" fill="#ffffff" stroke="#e3e8ef" stroke-width="2"/>
    <rect x="80" y="970" width="10" height="150" rx="5" fill="#0e7c86"/>
    <circle cx="172" cy="1045" r="44" fill="#0e7c86"/>
